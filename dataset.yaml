# Reference copy of the dataset config.
#
# The file you should actually train against is generated by
# scripts/prepare_dataset.py at dataset/prepared/data.yaml — it carries an
# absolute `path:` and is regenerated whenever you re-split the data.
#
# This copy exists so the class list is visible without downloading the
# dataset. Do not pass it to --data: the relative `path:` below is resolved
# against Ultralytics' global `datasets_dir` setting, not this repo, so it will
# silently look in the wrong place. Use dataset/prepared/data.yaml instead.

path: ./dataset/prepared
train: train/images
val: valid/images
test: test/images

nc: 9
names:
  0: 1 taka
  1: 2 taka
  2: 5 taka
  3: 10 taka
  4: 20 taka
  5: 50 taka
  6: 100 taka
  7: 500 taka
  8: 1000 taka
